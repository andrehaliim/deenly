name: deenly
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shimmer: ^3.0.0
  vibration: ^2.0.1
  flutter_compass: ^0.8.0
  url_launcher: ^6.2.0
  scrollable_positioned_list: ^0.3.8
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  font_awesome_flutter: ^11.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  workmanager: ^0.9.0+3
  flutter_launcher_icons: ^0.14.4
  home_widget: ^0.9.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/jsons/